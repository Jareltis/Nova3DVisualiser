name: Feature Request
description: Propose new functionality or optimization
labels: ["enhancement"]
assignees:
  - IvanSobolev
body:
  - type: markdown
    attributes:
      value: |
        Welcome to Neo 3d's feature request form.
        We love optimizations, renderer enhancements, and smart algorithms. Please describe your idea below.
  - type: textarea
    id: desc
    attributes:
      label: Description 
      description: Provide a clear and concise description of the feature to implement.
      placeholder: I want to add...
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem solved
      description: Is your feature request related to a specific problem or bottleneck? Please describe.
      placeholder: The current rendering algorithm allocates too much memory per frame when...
  - type: textarea
    id: others
    attributes:
      label: Other implementations / Math reference
      description: How is this typically handled in other console engines, graphics APIs, or math libraries? Please describe or provide links/papers.
      placeholder: This can be implemented using standard Moller-Trumbore optimization or Vulkan compute shaders like in...
    validations:
      required: false 
  - type: textarea
    id: why
    attributes:
      label: Benefit
      description: How will this addition benefit the usage or performance of Neo 3d?
      placeholder: This optimization will reduce memory footprint by 15% and increase FPS...
    validations:
      required: true 
  - type: checkboxes
    id: terms
    attributes:
      label: Duplicates & Guidelines
      description: By submitting this issue, you acknowledge the following
      options:
        - label: I have checked this feature request for duplicates.
          required: true
        - label: I have checked that this feature is not implemented in the [latest version](https://github.com/IvanSobolev/Neo3dEngine/releases).
          required: true
        - label: I agree to the [Contribution Guidelines](https://github.com/IvanSobolev/Neo3dEngine/blob/development/CONTRIBUTING.md).
          required: true