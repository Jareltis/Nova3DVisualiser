name: Bug/Crash Report
description: Report a problem with rendering, input, or networking
labels: ["bug"]
assignees:
  - IvanSobolev
body:
  - type: markdown
    attributes:
      value: |
        Welcome to Neo 3d's bug report form.
        Well-written bug reports with detailed environment specs are much more likely to be resolved quickly.
  - type: textarea
    id: desc
    attributes:
      label: Describe the bug/crash
      description: Provide a clear and concise description of the issue alongside steps to reproduce it.
      placeholder: |
        1. Start SampleGame in Release mode
        2. Press 'W' to move forward
        3. Import a custom .obj model
        4. See crash/rendering artifact
    validations:
      required: true
  - type: textarea
    id: intended
    attributes:
      label: Describe the intended behavior
      description: Provide a clear and concise description of the correct behavior.
      placeholder: The camera should move smoothly without freezing.
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: What Operating System are you using?
      options:
        - Windows 11
        - Windows 10
        - Linux (X11)
        - Linux (Wayland)
        - macOS
        - Other (Please specify in description)
    validations:
      required: true
  - type: textarea
    id: terminal
    attributes:
      label: What terminal emulator and host do you use?
      description: Console rendering heavily depends on your terminal capabilities (conhost, Windows Terminal, xterm, alacritty, etc.).
      placeholder: Windows Terminal v1.18 / GNOME Terminal
    validations:
      required: true
  - type: textarea
    id: sample-asset
    attributes:
      label: Provide a sample asset or scene code
      description: If the error is related to loading `.obj` files or custom scenes, please provide the file or code snippet here. You can upload a ZIP or paste the code.
      placeholder: Paste custom Scene class code or link to .obj file here.
  - type: textarea
    id: logs
    attributes:
      label: Stack Trace / Logs
      description: Provide any exception logs, stack traces, or console output related to the crash.
      placeholder: |
        System.IndexOutOfRangeException: Index was outside the bounds of the array.
           at _3dEngine.ConsoleScreenAsync.RenderFrame()...
    validations:
      required: false
  - type: checkboxes
    id: terms
    attributes:
      label: Duplicates & Guidelines
      description: By submitting this issue, you acknowledge the following
      options:
        - label: I have checked this issue for duplicates.
          required: true
        - label: I have checked that this issue occurs on the [latest version](https://github.com/IvanSobolev/Neo3dEngine/releases).
          required: true
        - label: I agree to the [Contribution Guidelines](https://github.com/IvanSobolev/Neo3dEngine/blob/development/CONTRIBUTING.md).
          required: true